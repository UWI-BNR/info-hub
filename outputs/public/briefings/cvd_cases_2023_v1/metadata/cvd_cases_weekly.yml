    2026-05-04
  creator: |-
    Ian Hambleton, Analyst
  registry: |-
    BNR-CVD
  content: |-
    Weekly and cumulative aggregate case counts
  tier: |-
    Public aggregate output
  temporal: |-
    2018-2023
  spatial: |-
    Barbados
  unit_of_analysis: |-
    Event type by week of year
  description: |-
    Weekly and cumulative hospital-ascertained stroke and heart attack case counts for 2023 compared with the 2018-2022 annual average.
  limitations: |-
    Counts describe hospital-ascertained cases and should not be interpreted as population incidence.
  language: |-
    en
  software: |-
