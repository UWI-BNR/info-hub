schema: bnr_dataset_metadata_v1
dataset_id: cvd_burden_metrics_current

files:
  dta: datasets/cvd_burden_metrics_current.dta
  csv: datasets/cvd_burden_metrics_current.csv
  yml: metadata/cvd_burden_metrics_current.yml

metadata:
  title: |-
    BNR CVD burden metrics
  release_id: |-
    cvd_2023_12
  registry: |-
    BNR-CVD
  geography: |-
    Barbados
  domain: |-
    cvd
  metric_family: |-
    burden
  metric_ids: |-
    CVD-BURDEN-001; CVD-BURDEN-002
  source_dataset: |-
    C:/yoshimi-hot/output/analyse-bnr/info-hub-private/work/bnrcvd_count_2023_v1.dta
  source_metadata: |-
    bnrcvd_count_2023_v1.yml
  unit_of_analysis: |-
    Event
  content: |-
    Long-format aggregate CVD burden metric output
  restrictions: |-
    Hospital-registered CVD events; DCO-only records excluded; 2009 excluded by design
  age_dimension: |-
    CVD-BURDEN-001 annual counts use under_45, 45_54, 55_64, 65_74, 75_84, 85_plus; CVD-BURDEN-002 age distribution uses under_50, 50_59, 60_69, 70_79, 80_plus, unknown
  time_dimension: |-
    Annual counts by age group; monthly counts not age-stratified
  comparator_annual: |-
    annual_previous_5yr_mean is the mean of the same stratum in the previous five calendar years
  comparator_monthly: |-
    monthly_same_month_previous_5yr_mean is the mean of the same calendar month and stratum in the previous five years
  confidence_intervals: |-
    Not calculated for this burden metric product
  caveat: |-
    Draft metrics product created from current count input dataset
  software: |-
    Stata
  created: |-
    19 May 2026 11:54:51

