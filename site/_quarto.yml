project:
  type: website
  resources:
    - assets/images/**
    - "assets/images/listings/*"
    - assets/fonts/**
    - downloads/**
  pre-render:
    - python scripts/build_download_catalogue.py
  render:
    - "*.qmd"
    - "**/*.qmd"
    - "!downloads/annual/cvd/latest/tables/*.md"
    - "!downloads/annual/cvd/**/*.md"
  output-dir: _site
  preview:
    port: 4200
    browser: true

# brand: _brand.yml

format:
  html:
    theme:
      light:
        - flatly
        - assets/scss/bnr.scss
#      dark:
#        - darkly
#        - assets/scss/bnr.scss
    toc: true
    toc-depth: 3
    anchor-sections: true
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: false
    fig-cap-location: bottom
    fontsize: 1rem
    linestretch: 1.55

website:
  title: "BNR Hub"
  site-url: https://uwi-bnr.github.io/info-hub/
  repo-url: https://github.com/UWI-BNR/info-hub

  page-navigation: true
  back-to-top-navigation: true
  bread-crumbs: true
  reader-mode: true

  search:
    location: navbar
    type: overlay
  open-graph: true
  image: assets/images/site-preview.png

  page-footer:
    border: true
    left: "© 2026, The UWI"
    center:
      - text: "Data Downloads"
        href: downloads/index.qmd
      - text: "Operations Manual"
        href: operations/index.qmd
      - text: "Technical Manual"
        href: technical/index.qmd
    right:
      - icon: github
        href: https://github.com/UWI-BNR/info-hub
        aria-label: GitHub repository
      - text: "Analytics: Stata · Python<br>Publishing: Quarto · Bootstrap/Flatly"

  navbar:
    background: primary 
    pinned: true
    logo: assets/images/uwi-crestonly-20p.png
    logo-alt: "University of the West Indies crest"
    title: "BNR Hub"
    collapse: true
    toggle-position: right

    left:
      - href: news/index.qmd
        text: Latest
      - text: Surveillance
        menu:
        - href: surveillance/cvd/index.qmd
          text: Cardiovascular disease
        - href: surveillance/hypertension/index.qmd
          text: Hypertension
        - href: surveillance/diabetes/index.qmd
          text: Diabetes
      - href: downloads/index.qmd
        text: Downloads
      - href: methods/index.qmd
        text: Methods
      - href: about/index.qmd
        text: About

  sidebar:
    - id: cvd
      title: "CVD surveillance"
      style: "docked"
      search: true
      collapse-level: 1
